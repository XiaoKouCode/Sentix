{% extends "admin/base.html" %}

{% block title %}新增用户 - Sentix管理后台{% endblock %}
{% block page_header %}新增用户{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card card-primary">
            <div class="card-header">
                <h3 class="card-title">新增用户</h3>
            </div>
            <form method="POST">
                <div class="card-body">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" class="form-control" name="username" id="username" required placeholder="请输入用户名">
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" class="form-control" name="password" id="password" required placeholder="请输入密码">
                    </div>
                    <div class="form-group">
                        <label for="email">邮箱</label>
                        <input type="email" class="form-control" name="email" id="email" placeholder="请输入邮箱（可选）">
                    </div>
                    <div class="form-group">
                        <label for="role">角色</label>
                        <select class="form-control" name="role" id="role">
                            <option value="user">普通用户</option>
                            <option value="admin">管理员</option>
                        </select>
                    </div>
                </div>
                <div class="card-footer">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> 保存
                    </button>
                    <a href="{{ url_for('admin_users') }}" class="btn btn-default">取消</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
